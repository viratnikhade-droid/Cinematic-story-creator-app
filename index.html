<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cineplot Studio</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#000000,#1a1a2e,#000000);
color:white;
text-align:center;
}

header{
padding:30px;
font-size:40px;
font-weight:bold;
background:#111;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

.container{
margin-top:40px;
padding:20px;
}

input{
padding:12px;
font-size:16px;
width:260px;
border-radius:6px;
border:none;
outline:none;
}

select{
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
padding:12px 25px;
font-size:18px;
background:#ff3c3c;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#ff0000;
}

.storyBox{
margin-top:40px;
background:#111;
padding:25px;
border-radius:10px;
max-width:650px;
margin-left:auto;
margin-right:auto;
font-size:18px;
line-height:1.6;
}

footer{
margin-top:60px;
padding:20px;
background:#111;
font-size:14px;
}

</style>

</head>

<body>

<header>
🎬 Cineplot Studio
</header>

<div class="container">

<p>Create cinematic stories instantly</p>

<input id="character" placeholder="Enter a character name">

<br><br>

<select id="genre">
<option value="action">Action</option>
<option value="horror">Horror</option>
<option value="scifi">Sci-Fi</option>
<option value="fantasy">Fantasy</option>
</select>

<br>

<button onclick="generateStory()">Generate Story</button>

<div class="storyBox">
<p id="story">Your cinematic story will appear here...</p>
</div>

</div>

<footer>
© 2026 Cineplot Studio | Created by Virat
</footer>

<script>

const stories = {

action:[
"CHARACTER races through a burning city chasing a dangerous criminal.",
"Explosions shake the ground as CHARACTER fights to save the world.",
"CHARACTER leads a secret mission to stop a global catastrophe."
],

horror:[
"Late at night, CHARACTER hears footsteps in an empty house.",
"A mysterious shadow begins following CHARACTER everywhere.",
"CHARACTER discovers a cursed object that awakens a terrifying spirit."
],

scifi:[
"CHARACTER travels through space to a distant planet.",
"An advanced AI chooses CHARACTER for an intergalactic mission.",
"CHARACTER discovers a hidden alien civilization."
],

fantasy:[
"CHARACTER enters a magical kingdom filled with dragons.",
"A mysterious wizard gives CHARACTER a powerful artifact.",
"CHARACTER must defeat a dark sorcerer to restore peace."
]

};

function generateStory(){

let name = document.getElementById("character").value;

if(name === ""){
name = "Alex";
}

let genre = document.getElementById("genre").value;

let genreStories = stories[genre];

let randomIndex = Math.floor(Math.random()*genreStories.length);

let story = genreStories[randomIndex].replaceAll("CHARACTER", name);

document.getElementById("story").innerText = story;

}

</script>

</body>

</html>
